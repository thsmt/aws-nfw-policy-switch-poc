AWSTemplateFormatVersion: "2010-09-09"
Description: "PoC for switching AWS Network Firewall policies during patch maintenance windows."

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Network Firewall"
        Parameters:
          - FirewallArn
          - NormalFirewallPolicyArn
          - PatchFirewallPolicyArn
      - Label:
          default: "Lambda"
        Parameters:
          - LambdaFunctionName
          - LogRetentionInDays
      - Label:
          default: "EventBridge Scheduler"
        Parameters:
          - PatchScheduleExpression
          - NormalScheduleExpression
          - ScheduleTimezone
          - ScheduleState

Parameters:
  FirewallArn:
    Type: String
    Description: ARN of the AWS Network Firewall to update.
    AllowedPattern: "^arn:(aws|aws-us-gov|aws-cn):network-firewall:[a-z0-9-]+:[0-9]{12}:firewall/.+$"

  NormalFirewallPolicyArn:
    Type: String
    Description: ARN of the firewall policy for normal operation.
    AllowedPattern: "^arn:(aws|aws-us-gov|aws-cn):network-firewall:[a-z0-9-]+:[0-9]{12}:firewall-policy/.+$"

  PatchFirewallPolicyArn:
    Type: String
    Description: ARN of the firewall policy for patch operation.
    AllowedPattern: "^arn:(aws|aws-us-gov|aws-cn):network-firewall:[a-z0-9-]+:[0-9]{12}:firewall-policy/.+$"

  LambdaFunctionName:
    Type: String
    Description: Lambda function name.
    Default: nfw-policy-switcher
    AllowedPattern: "^[a-zA-Z0-9-_]{1,64}$"

  PatchScheduleExpression:
    Type: String
    Description: Schedule expression to switch to the patch operation policy.
    Default: "cron(0 1 ? * SUN *)"

  NormalScheduleExpression:
    Type: String
    Description: Schedule expression to switch back to the normal operation policy.
    Default: "cron(0 5 ? * SUN *)"

  ScheduleTimezone:
    Type: String
    Description: Time zone for EventBridge Scheduler.
    Default: Asia/Tokyo

  ScheduleState:
    Type: String
    Description: Initial state of EventBridge Scheduler schedules.
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED

  LogRetentionInDays:
    Type: Number
    Description: Retention period for Lambda logs.
    Default: 30
    AllowedValues:
      - 1
      - 3
      - 7
      - 14
      - 30
      - 60
      - 90
      - 180
      - 365

Resources:
  PolicySwitcherLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${LambdaFunctionName}"
      RetentionInDays: !Ref LogRetentionInDays

  PolicySwitcherRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: network-firewall-policy-switch
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${PolicySwitcherLogGroup.Arn}:*"
              - Effect: Allow
                Action:
                  - network-firewall:DescribeFirewall
                Resource: !Ref FirewallArn
              - Effect: Allow
                Action:
                  - network-firewall:AssociateFirewallPolicy
                Resource:
                  - !Ref FirewallArn
                  - !Ref NormalFirewallPolicyArn
                  - !Ref PatchFirewallPolicyArn

  PolicySwitcherFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - PolicySwitcherLogGroup
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Description: "Switch AWS Network Firewall policy between normal and patch operations."
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt PolicySwitcherRole.Arn
      Timeout: 60
      Environment:
        Variables:
          FIREWALL_ARN: !Ref FirewallArn
          NORMAL_POLICY_ARN: !Ref NormalFirewallPolicyArn
          PATCH_POLICY_ARN: !Ref PatchFirewallPolicyArn
      Code:
        ZipFile: |
          import json
          import logging
          import os

          import boto3

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          TARGET_POLICY_TO_ENV = {
              "normal": "NORMAL_POLICY_ARN",
              "patch": "PATCH_POLICY_ARN",
          }

          client = boto3.client("network-firewall")

          def lambda_handler(event, context):
              logger.info("Received event: %s", json.dumps(event))

              target_policy = str(event.get("targetPolicy", "")).lower()
              if target_policy not in TARGET_POLICY_TO_ENV:
                  return {
                      "statusCode": 400,
                      "body": json.dumps({
                          "message": "targetPolicy must be normal or patch"
                      }),
                  }

              firewall_arn = os.environ["FIREWALL_ARN"]
              policy_arn = os.environ[TARGET_POLICY_TO_ENV[target_policy]]

              firewall = client.describe_firewall(FirewallArn=firewall_arn)
              update_token = firewall.get("UpdateToken")

              request = {
                  "FirewallArn": firewall_arn,
                  "FirewallPolicyArn": policy_arn,
              }
              if update_token:
                  request["UpdateToken"] = update_token

              response = client.associate_firewall_policy(**request)
              logger.info("Switched firewall policy to %s: %s", target_policy, policy_arn)

              return {
                  "statusCode": 200,
                  "body": json.dumps({
                      "targetPolicy": target_policy,
                      "firewallArn": response.get("FirewallArn"),
                      "firewallPolicyArn": response.get("FirewallPolicyArn"),
                  }),
              }

  SchedulerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-scheduler-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: invoke-policy-switcher-lambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt PolicySwitcherFunction.Arn

  SwitchToPatchSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${AWS::StackName}-switch-to-patch"
      Description: "Switch to patch operation firewall policy."
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: !Ref PatchScheduleExpression
      ScheduleExpressionTimezone: !Ref ScheduleTimezone
      State: !Ref ScheduleState
      Target:
        Arn: !GetAtt PolicySwitcherFunction.Arn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn
        Input: "{\"targetPolicy\":\"patch\"}"

  SwitchToNormalSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${AWS::StackName}-switch-to-normal"
      Description: "Switch back to normal operation firewall policy."
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: !Ref NormalScheduleExpression
      ScheduleExpressionTimezone: !Ref ScheduleTimezone
      State: !Ref ScheduleState
      Target:
        Arn: !GetAtt PolicySwitcherFunction.Arn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn
        Input: "{\"targetPolicy\":\"normal\"}"

Outputs:
  PolicySwitcherFunctionName:
    Description: Lambda function name.
    Value: !Ref PolicySwitcherFunction

  PolicySwitcherFunctionArn:
    Description: Lambda function ARN.
    Value: !GetAtt PolicySwitcherFunction.Arn

  SwitchToPatchScheduleName:
    Description: EventBridge Scheduler schedule for patch operation policy.
    Value: !Ref SwitchToPatchSchedule

  SwitchToNormalScheduleName:
    Description: EventBridge Scheduler schedule for normal operation policy.
    Value: !Ref SwitchToNormalSchedule

  TargetFirewallArn:
    Description: Target AWS Network Firewall ARN.
    Value: !Ref FirewallArn
